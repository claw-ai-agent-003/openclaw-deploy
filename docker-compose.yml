version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - OPENCLAW_AUTH_URL=${OPENCLAW_AUTH_URL}
      - OPENCLAW_IMAGE=${OPENCLAW_IMAGE:-openclaw/openclaw:latest}
      - DEPLOY_DOMAIN=${DEPLOY_DOMAIN:-deploy.openclaw.com}
      # Uncomment and fill in for OAuth:
      # - GITHUB_CLIENT_ID=your_github_client_id
      # - GITHUB_CLIENT_SECRET=your_github_secret
      # - GITHUB_REDIRECT_URI=https://yourdomain.com/api/auth/github/callback
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    # No external port mapping — only backend needs access via internal network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
