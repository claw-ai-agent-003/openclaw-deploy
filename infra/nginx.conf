worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  keepalive_timeout 65;
  gzip on;

  # Frontend static files
  server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # Serve frontend for non-API routes
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
      proxy_pass http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 300s;
      proxy_connect_timeout 75s;
    }
  }

  # Redirect HTTP to HTTPS (enable in production)
  # server {
  #   listen 443 ssl http2;
  #   server_name deploy.openclaw.com;
  #   ssl_certificate /etc/letsencrypt/live/deploy.openclaw.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/deploy.openclaw.com/privkey.pem;
  #   include /etc/nginx/ssl.conf;
  # }
}
